<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // When GitHub Pages serves a 404 for a path like /slidev-template/2,
    // this page encodes the path into a query string and redirects to index.html,
    // which then restores the original path via the script in index.html.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '')) +
      l.hash
    );
  </script>
</head>
</html>
